:root {
  --paper: #f5f1e6;
  --paper-glass: rgba(247, 243, 232, 0.92);
  --ink: #22301f;
  --ink-soft: #57614f;
  --green: #2e7d5b;
  --oxide: #c14a2e;
  --sand: #c9b892;
  --hair: rgba(34, 48, 31, 0.18);
  --shadow: 0 10px 30px rgba(34, 48, 31, 0.16);
  --card-w: min(30rem, 42vw);
}
[data-theme="dark"] {
  --paper: #131a15;
  --paper-glass: rgba(17, 24, 19, 0.9);
  --ink: #e8e2d0;
  --ink-soft: #a9a893;
  --green: #6fbd93;
  --oxide: #e0714f;
  --sand: #6f6a52;
  --hair: rgba(232, 226, 208, 0.2);
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: "Fraunces", Charter, "Iowan Old Style", Georgia, serif;
  font-size: 1.06rem;
  line-height: 1.62;
}
#map { position: fixed; inset: 0; }
#map::after { /* soft vignette so cards & labels read over busy tiles */
  content: ""; position: absolute; inset: 0; pointer-events: none;
  box-shadow: inset 0 0 140px rgba(34, 48, 31, 0.12);
}
#map-fallback {
  position: fixed; inset: 0; display: grid; place-items: center;
  padding: 2rem; text-align: center; color: var(--ink-soft); display: none;
}

/* ---------- story column ---------- */
main { position: relative; z-index: 2; pointer-events: none; }
.step {
  min-height: 92vh;
  display: flex; align-items: center;
  padding: 2.5rem 0 2.5rem clamp(1rem, 4vw, 4rem);
}
.card {
  pointer-events: auto;
  width: var(--card-w);
  background: var(--paper-glass);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid var(--hair);
  border-top: 3px solid var(--green);
  border-radius: 4px;
  box-shadow: var(--shadow);
  padding: 1.35rem 1.6rem 1.45rem;
  opacity: 0.55;
  transform: translateY(6px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.step.active .card { opacity: 1; transform: none; }
.card.oxide { border-top-color: var(--oxide); }
.card p { margin: 0.55rem 0 0; }
.card p:first-child { margin-top: 0; }
.chip {
  display: inline-block;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
  border: 1px solid var(--hair);
  border-radius: 2px;
  padding: 0.15rem 0.5rem;
  margin-bottom: 0.7rem;
}
.card a {
  color: var(--green);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
}
.card a:hover, .card a:focus-visible { color: var(--oxide); }
.aside { color: var(--ink-soft); font-size: 0.94rem; }
.legend { list-style: none; margin: 0.8rem 0 0; padding: 0; font-size: 0.92rem; color: var(--ink-soft); }
.legend li { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.35rem; }
.swatch { flex: none; width: 2.1rem; height: 0; border-top: 3px solid var(--oxide); }
.swatch.dashed { border-top-style: dashed; border-top-color: var(--ink-soft); }
.num { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 0.92em; }

/* ---------- hero & fin ---------- */
.hero { min-height: 100vh; align-items: center; justify-content: center; padding: 1rem; }
.hero .card {
  width: min(38rem, 92vw);
  text-align: center;
  border-top-width: 4px;
  padding: 2.6rem 2rem 2.2rem;
}
.kicker {
  font-family: ui-monospace, Menlo, Consolas, monospace;
  font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--oxide); margin: 0;
}
h1 {
  font-weight: 700;
  font-variation-settings: "opsz" 144;
  font-size: clamp(2.3rem, 6vw, 3.6rem);
  line-height: 1.08;
  margin: 0.7rem 0 0.9rem;
  letter-spacing: -0.01em;
}
.hero .sub { color: var(--ink-soft); font-size: 1.02rem; max-width: 30rem; margin: 0 auto; }
.scroll-cue {
  margin-top: 1.8rem; font-family: ui-monospace, Menlo, monospace;
  font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft);
}
.scroll-cue::after { content: "↓"; display: block; margin-top: 0.3rem; animation: bob 1.8s ease-in-out infinite; }
@keyframes bob { 50% { transform: translateY(5px); } }
.fin-mark {
  text-align: center; color: var(--sand); letter-spacing: 0.4em;
  margin-top: 1.4rem; font-size: 0.85rem;
}
.credits { font-size: 0.8rem; color: var(--ink-soft); margin-top: 1.1rem; border-top: 1px solid var(--hair); padding-top: 0.8rem; }

/* ---------- HUD clock ---------- */
#hud {
  position: fixed; top: 0.9rem; right: 3.4rem; z-index: 5;
  background: var(--paper-glass); border: 1px solid var(--hair); border-radius: 4px;
  box-shadow: var(--shadow);
  padding: 0.4rem 0.8rem; text-align: right;
  transition: opacity 0.4s ease;
  pointer-events: none;
}
#hud[hidden] { display: block; opacity: 0; }
#hud-time { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 1.15rem; font-weight: 600; }
#hud-note { font-size: 0.72rem; color: var(--ink-soft); font-family: ui-monospace, Menlo, monospace; letter-spacing: 0.04em; }

/* ---------- controls ---------- */
#theme-btn {
  position: fixed; top: 0.9rem; right: 0.9rem; z-index: 6;
  width: 2rem; height: 2rem; padding: 0.3rem;
  display: grid; place-items: center;
  background: var(--paper-glass); color: var(--ink);
  border: 1px solid var(--hair); border-radius: 4px; cursor: pointer;
  box-shadow: var(--shadow);
}
#theme-btn svg { width: 1.1rem; height: 1.1rem; }
#theme-btn .sun { display: none; }
[data-theme="dark"] #theme-btn .sun { display: block; }
[data-theme="dark"] #theme-btn .moon { display: none; }

#dots {
  position: fixed; right: 0.95rem; top: 50%; transform: translateY(-50%);
  z-index: 5; display: flex; flex-direction: column; gap: 0.45rem;
}
#dots button {
  width: 0.55rem; height: 0.55rem; padding: 0; border-radius: 50%;
  border: 1px solid var(--ink-soft); background: transparent; cursor: pointer;
  transition: background 0.3s, transform 0.3s;
}
#dots button[aria-current="true"] { background: var(--oxide); border-color: var(--oxide); transform: scale(1.35); }
#dots button:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }

#notice {
  position: fixed; left: 50%; bottom: 1rem; transform: translateX(-50%);
  z-index: 7; background: var(--paper-glass); border: 1px solid var(--oxide);
  border-radius: 4px; padding: 0.5rem 0.9rem; font-size: 0.85rem; max-width: 26rem;
  box-shadow: var(--shadow);
}
#notice[hidden] { display: none; }

/* ---------- map markers ---------- */
.mk { display: flex; align-items: center; gap: 0.4rem; }
.mk-dot {
  flex: none; width: 12px; height: 12px; border-radius: 50%;
  background: var(--green); border: 2px solid var(--paper);
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
}
.mk.oxide .mk-dot { background: var(--oxide); }
.mk-label {
  font-family: "Fraunces", Georgia, serif; font-size: 0.82rem; font-weight: 600;
  color: var(--ink); background: var(--paper-glass);
  border: 1px solid var(--hair); border-radius: 3px;
  padding: 0.05rem 0.45rem; text-decoration: none; white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
}
a.mk-label:hover, a.mk-label:focus-visible { color: var(--oxide); text-decoration: underline; }
.mk.left { flex-direction: row-reverse; }
.mk.focus .mk-dot { animation: pulse 2s ease-out infinite; }
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(193, 74, 46, 0.55); }
  70% { box-shadow: 0 0 0 14px rgba(193, 74, 46, 0); }
  100% { box-shadow: 0 0 0 0 rgba(193, 74, 46, 0); }
}
.route-label .mk-label {
  font-family: ui-monospace, Menlo, monospace; font-weight: 400; font-size: 0.72rem;
  letter-spacing: 0.05em; color: var(--ink-soft);
}
.route-label .mk-dot { display: none; }
.maplibregl-marker { transition: opacity 0.4s ease; }

@media (prefers-reduced-motion: reduce) {
  .card, .maplibregl-marker { transition: none; }
  .scroll-cue::after, .mk.focus .mk-dot { animation: none; }
}

/* ---------- mobile: map on top, card pinned low ---------- */
@media (max-width: 760px) {
  :root { --card-w: 100%; }
  body { font-size: 0.95rem; }
  .step { padding: 58vh 0.7rem 4vh; justify-content: center; align-items: flex-end; }
  .hero { padding: 1rem 0.8rem; align-items: center; }
  .card {
    max-width: 30rem; padding: 0.95rem 1.05rem 1.05rem;
    max-height: 36vh; overflow-y: auto;
  }
  .hero .card { max-height: none; }
  #hud {
    left: 0.7rem; right: auto; top: 0.7rem; text-align: left;
    padding: 0.25rem 0.6rem;
  }
  #hud-time { font-size: 0.95rem; }
  #theme-btn { top: 0.7rem; right: 0.7rem; }
  #dots { right: 0.4rem; gap: 0.34rem; }
  #dots button { width: 0.42rem; height: 0.42rem; }
  .mk-label { font-size: 0.74rem; }
  .legend { font-size: 0.85rem; }
}
</style>
</head>

  <div id="hud-note"></div>
</div>

    routes: { detour: "draw", through: "ghost" },
    hud: { time: "1:50 pm", note: "5.2 km by Rapido" },
  },
  {
    id: "maths", label: "The maths", chip: "1:50 pm",
    html: `<p>The bus would arrive at 2&nbsp;pm. The workshop was at 2&nbsp;pm. It was a 24-minute walk.</p>
      <p>Since I brisk-walk 25% faster than Google Maps, I could be there by 2:10&nbsp;pm on foot. The bus was uncertain.</p>
      <p>So I brisk-walked.</p>`,
    cam: { fit: ["brisk"] },
    markers: ["front", "luxor"], routes: { brisk: "active" },
    hud: { time: "1:50 pm", note: "1.6 km · ETA 2:10 pm on foot" },
  },
  {
    id: "late", label: "2:15 pm", chip: "2:15 pm",
    html: `<p>And ended up in my own workshop 15 minutes late.</p>
      <p>Without breakfast. Or lunch.</p>`,
    cam: { fit: ["brisk"] },
    markers: ["front", "luxor"], focus: "luxor", routes: { brisk: "draw" },
    hud: { time: "2:15 pm", note: "15 min late" },
  },
  {
    id: "out1", label: "After the workshop", chip: "After the workshop", oxide: true,
    html: `<p>After the workshop, I walked out via Gate&nbsp;3.</p>
      <p>The security turned me around. I turned around.</p>`,
    cam: { fit: ["exitA", L.luxor.c], maxZoom: 17.4 },
    markers: ["luxor", "guard1"], focus: "guard1", routes: { exitA: "draw" },
    hud: { time: "", note: "after the workshop" },
  },
  {
    id: "out2", label: "The badge", oxide: true,
    html: `<p>But after 5 minutes, I turned back. I took off my visitor badge and walked out.</p>
      <p>He shouted at me to turn around. I kept walking.</p>`,
    cam: { fit: ["exitA", L.luxor.c], maxZoom: 17.6 },
    markers: ["luxor", "guard1"], focus: "guard1", routes: { exitA: "active" },
    hud: { time: "", note: "5 minutes later" },
  },
  {
    id: "out3", label: "The pursuit", oxide: true,
    html: `<p>He followed me, shouting. I kept walking, tiredly.</p>
      <p>He called the security at the next check, who stood in front of me, blocking me, and asked what I thought I was doing.</p>`,
    cam: { fit: ["exitB"], maxZoom: 17.2 },
    markers: ["guard1", "gate3"], focus: "gate3", routes: { exitA: "ghost", exitB: "draw" },
    hud: { time: "", note: "still walking" },
  },
  {
    id: "out4", label: "Just going out", oxide: true,
    html: `<p>“I'm just going out,” I said, tiredly. And walked around him.</p>
      <p>He followed me, shouting. I kept walking, tiredly.</p>`,
    cam: { fit: ["exitC"], maxZoom: 17.2 },
    markers: ["gate3", "bugbean"], routes: { exitB: "ghost", exitC: "draw" },
    hud: { time: "", note: "still walking, tiredly" },
  },
  {
    id: "lunch", label: "Lunch, finally", chip: "Lunch, finally",
    html: `<p>I had lunch at ${A("bugbean", "Bug & Bean Cafe")}.</p>
      <p>Unfortunately, their chef was unavailable, so most of the interesting dishes were unavailable too.</p>`,
    cam: { center: L.bugbean.c, zoom: 16.9 },
    markers: ["bugbean"], focus: "bugbean", routes: { exitC: "ghost" },
    hud: { time: "", note: "620 m from the venue" },
  },
  {
    id: "fin", label: "Fin",
    html: `<p>I had a peri peri paneer sandwich.</p>
      <p class="fin-mark">· · ·</p>
      <p class="credits">Every route on this map is the actual GPS trace of the day. Map tiles © <a href="https://openfreemap.org" target="_blank" rel="noopener">OpenFreeMap</a>, data © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors.</p>`,
    cam: { center: L.bugbean.c, zoom: 17.4 },
    markers: ["bugbean"], routes: {},
    hud: { time: "", note: "" },
  },
];

/* ---------- build DOM ---------- */
const story = document.getElementById("story");
const dots = document.getElementById("dots");
scenes.forEach((s, i) => {
  const step = document.createElement("section");
  step.className = "step" + (s.hero ? " hero" : "");
  step.id = "s" + i;
  const chip = s.chip ? `<span class="chip">${s.chip}</span>` : "";
  step.innerHTML = `<article class="card${s.oxide ? " oxide" : ""}">${chip}${s.html}</article>`;
  story.appendChild(step);
  const dot = document.createElement("button");
  dot.setAttribute("aria-label", `Scene ${i + 1}: ${s.label}`);
  dot.title = s.label;
  dot.addEventListener("click", () => step.scrollIntoView({ block: "start" }));
  dots.appendChild(dot);
});

/* ---------- theme (bookmarkable: #s3&theme=dark) ---------- */
const hashParams = () => new URLSearchParams(location.hash.slice(1).replace(/^s(\d+)&?/, "s=$1&"));
const initParams = hashParams();
let theme = initParams.get("theme") ?? localStorage.getItem("theme") ??
  (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
let current = Math.min(scenes.length - 1, Math.max(0, +(initParams.get("s") ?? 0) || 0));
const RM = matchMedia("(prefers-reduced-motion: reduce)").matches;

function setHash() {
  const h = `#s${current}` + (theme === "dark" ? "&theme=dark" : "");
  history.replaceState(null, "", h);
}
function applyTheme() {
  document.documentElement.dataset.theme = theme;
  localStorage.setItem("theme", theme);
  setHash();
}
applyTheme();

/* ---------- map ---------- */
const STYLE = { light: "https://tiles.openfreemap.org/styles/positron", dark: "https://tiles.openfreemap.org/styles/dark" };
let map, mapReady = false;
try {
  map = new maplibregl.Map({
    container: "map",
    style: STYLE[theme],
    center: L.gate3.c, zoom: 12,
    interactive: false,
    attributionControl: { compact: true },
  });
} catch (e) {
  document.getElementById("map-fallback").style.display = "grid";
}

const markers = {};
function makeMarkers() {
  for (const [key, loc] of Object.entries(L)) {
    const el = document.createElement("div");
    el.className = "mk" + (loc.oxide ? " oxide" : "") + (loc.side === "left" ? " left" : "");
    const text = innerWidth <= 760 && loc.short ? loc.short : loc.name;
    const label = loc.url
      ? `<a class="mk-label" href="${loc.url}" target="_blank" rel="noopener" title="Open ${loc.name} in Google Maps">${text}</a>`
      : `<span class="mk-label">${text}</span>`;
    el.innerHTML = `<span class="mk-dot"></span>${label}`;
    markers[key] = new maplibregl.Marker({
      element: el,
      anchor: loc.side === "left" ? "right" : "left",
      offset: [loc.side === "left" ? 8 : -8, 0],
    }).setLngLat(loc.c).addTo(map);
    el.style.display = "none";
  }
  // route annotation labels: the 2 km vs 4 km contrast
  const mk = (key, text, at) => {
    const el = document.createElement("div");
    el.className = "mk route-label";
    el.innerHTML = `<span class="mk-label">${text}</span>`;
    markers[key] = new maplibregl.Marker({ element: el, anchor: "center" }).setLngLat(at).addTo(map);
    el.style.display = "none";
  };
  mk("lbl-through", "2 km · through · not allowed", pointAt(R.through, CUM.through, CUM.through.at(-1) * 0.5));
  mk("lbl-detour", "4 km · around · allowed", pointAt(R.detour, CUM.detour, CUM.detour.at(-1) * 0.62));
}

function addOverlays() {
  for (const [key, pts] of Object.entries(R)) {
    if (key === "exit") continue;
    map.addSource("r-" + key, { type: "geojson", data: { type: "Feature", geometry: { type: "LineString", coordinates: pts } } });
    map.addLayer({
      id: "l-" + key, type: "line", source: "r-" + key,
      layout: { "line-cap": "round", "line-join": "round", visibility: "none" },
      paint: {
        "line-color": COLORS[key], "line-width": key === "through" ? 3 : 4.5,
        ...(key === "through" ? { "line-dasharray": [1.4, 2] } : {}),
      },
    });
  }
  map.addSource("r-progress", { type: "geojson", data: { type: "Feature", geometry: { type: "LineString", coordinates: [] } } });
  map.addLayer({
    id: "l-progress", type: "line", source: "r-progress",
    layout: { "line-cap": "round", "line-join": "round" },
    paint: { "line-color": COLORS.plan, "line-width": 4.5 },
  });
  map.addSource("r-dot", { type: "geojson", data: { type: "FeatureCollection", features: [] } });
  map.addLayer({
    id: "l-dot", type: "circle", source: "r-dot",
    paint: {
      "circle-radius": 7, "circle-color": COLORS.plan,
      "circle-stroke-width": 2.5, "circle-stroke-color": "#ffffff",
    },
  });
}

/* ---------- camera ---------- */
function pad() {
  // mobile: card sits in the bottom ~40vh, HUD in the top-left corner;
  // horizontal padding leaves room for marker labels either side of their dots
  if (innerWidth <= 760) return { top: 76, bottom: Math.round(innerHeight * 0.44), left: 104, right: 60 };
  const card = Math.min(innerWidth * 0.42, 480);
  return { top: 76, bottom: 70, left: card + Math.max(40, innerWidth * 0.04) + 30, right: 90 };
}
function applyCamera(cam, instant) {
  const duration = RM || instant ? 0 : 1900;
  // "wide": full-screen title card — keep points in the visible band above it on mobile
  const padding = cam.pad === "wide"
    ? (innerWidth <= 760 ? { top: 90, bottom: Math.round(innerHeight * 0.62), left: 40, right: 40 } : 70)
    : typeof cam.pad === "number" ? cam.pad : pad();
  if (cam.fit) {
    const pts = cam.fit.flatMap(f => typeof f === "string" ? R[f] : [f]);
    const b = pts.reduce((bb, p) => bb.extend(p), new maplibregl.LngLatBounds(pts[0], pts[0]));
    map.fitBounds(b, { padding, duration, maxZoom: cam.maxZoom ?? 17, essential: true });
  } else {
    // offset, not padding: easeTo padding is persistent and would stack onto later fitBounds
    const offset = typeof padding === "number" ? [0, 0]
      : [(padding.left - padding.right) / 2, (padding.top - padding.bottom) / 2];
    map.easeTo({ center: cam.center, zoom: cam.zoom, offset, duration, essential: true });
  }
}

/* ---------- route draw animation ---------- */
let animId = 0;
const setProgress = (coords, head, color) => {
  map.getSource("r-progress").setData({ type: "Feature", geometry: { type: "LineString", coordinates: coords } });
  map.setPaintProperty("l-progress", "line-color", color);
  map.setPaintProperty("l-dot", "circle-color", color);
  map.getSource("r-dot").setData({
    type: "FeatureCollection",
    features: head ? [{ type: "Feature", geometry: { type: "Point", coordinates: head } }] : [],
  });
};
function startDraw(key) {
  const pts = R[key], cum = CUM[key], total = cum.at(-1), color = COLORS[key];
  if (RM) { setProgress(pts, pts.at(-1), color); return; }
  const dur = Math.min(4200, 1100 + total * 0.6);
  const t0 = performance.now();
  const tick = now => {
    const t = Math.min(1, (now - t0) / dur);
    const e = t < 0.5 ? 2 * t * t : 1 - (-2 * t + 2) ** 2 / 2;
    const sliced = sliceAt(pts, cum, e * total);
    setProgress(sliced, t < 1 ? sliced.at(-1) : pts.at(-1), color);
    if (t < 1) animId = requestAnimationFrame(tick);
  };
  animId = requestAnimationFrame(tick);
}

/* ---------- scene application (full declarative state) ---------- */
const hud = document.getElementById("hud");
function applyScene(i, instant) {
  current = i;
  const s = scenes[i];
  document.querySelectorAll(".step").forEach((el, j) => el.classList.toggle("active", j === i));
  dots.querySelectorAll("button").forEach((b, j) => b.setAttribute("aria-current", j === i ? "true" : "false"));
  if (s.hud?.time || s.hud?.note) {
    hud.hidden = false;
    const t = document.getElementById("hud-time");
    t.textContent = s.hud.time || "";
    t.style.display = s.hud.time ? "" : "none";
    document.getElementById("hud-note").textContent = s.hud.note || "";
  } else hud.hidden = true;
  setHash();
  if (!mapReady) return;

  cancelAnimationFrame(animId);
  let drawKey = null;
  for (const key of Object.keys(R)) {
    if (key === "exit") continue;
    const mode = s.routes[key];
    map.setLayoutProperty("l-" + key, "visibility", mode ? "visible" : "none");
    if (mode) map.setPaintProperty("l-" + key, "line-opacity", mode === "ghost" ? 0.28 : mode === "draw" ? 0.15 : 0.9);
    if (mode === "draw") drawKey = key;
  }
  if (drawKey) startDraw(drawKey); else setProgress([], null, COLORS.plan);
  for (const [key, m] of Object.entries(markers)) {
    m.getElement().style.display = s.markers.includes(key) ? "" : "none";
    m.getElement().classList.toggle("focus", s.focus === key);
  }
  applyCamera(s.cam, instant);
}

/* ---------- wiring ---------- */
if (map) {
  map.on("error", e => {
    if (!mapReady && !map.loaded()) document.getElementById("map-fallback").style.display = "grid";
  });
  map.on("load", () => {
    makeMarkers();
    addOverlays();
    mapReady = true;
    applyScene(current, true);
  });
  // theme switch swaps basemap style; overlays must be rebuilt after the wipe
  map.on("style.load", () => {
    if (!mapReady) return;
    addOverlays();
    applyScene(current, true);
  });
}

document.getElementById("theme-btn").addEventListener("click", () => {
  theme = theme === "dark" ? "light" : "dark";
  applyTheme();
  if (mapReady) map.setStyle(STYLE[theme]);
});

const io = new IntersectionObserver(entries => {
  for (const en of entries) if (en.isIntersecting) applyScene(+en.target.id.slice(1));
}, { rootMargin: "-45% 0px -45% 0px" });
document.querySelectorAll(".step").forEach(el => io.observe(el));

addEventListener("keydown", e => {
  if (e.target.closest("input,textarea") || e.metaKey || e.ctrlKey || e.altKey) return;
  const go = i => {
    e.preventDefault();
    document.getElementById("s" + Math.min(scenes.length - 1, Math.max(0, i)))
      .scrollIntoView({ block: "start" });
  };
  if (["ArrowDown", "PageDown", "j", " "].includes(e.key)) go(current + 1);
  else if (["ArrowUp", "PageUp", "k"].includes(e.key)) go(current - 1);
  else if (e.key === "Home") go(0);
  else if (e.key === "End") go(scenes.length - 1);
});

let resizeT;
addEventListener("resize", () => {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => mapReady && applyCamera(scenes[current].cam, true), 250);
});

// restore scrolled position for a bookmarked scene
if (current > 0) requestAnimationFrame(() =>
  document.getElementById("s" + current).scrollIntoView({ block: "start", behavior: "instant" }));
applyScene(current, true);
</script>
</body>
</html>
